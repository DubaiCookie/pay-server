apiVersion: apps/v1
kind: Deployment
metadata:
  name: pay-server
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pay-server
  template:
    metadata:
      labels:
        app: pay-server
    spec:
      containers:
        - name: pay-server
          image: amdp-registry.skala-ai.com/skala26a-cloud/team3-pay-server:latest
          ports:
            - containerPort: 8078
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: config-volume
              mountPath: /app/config    # Spring Boot가 여기서 application.properties 읽음
          env:
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pay-server-secret
                  key: SPRING_DATASOURCE_PASSWORD
            - name: TOSS_PAYMENT_API_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: pay-server-secret
                  key: TOSS_PAYMENT_API_SECRET_KEY
            - name: TOSS_PAYMENT_API_CLIENT_KEY
              valueFrom:
                secretKeyRef:
                  name: pay-server-secret
                  key: TOSS_PAYMENT_API_CLIENT_KEY
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: pay-server-secret
                  key: JWT_SECRET
      volumes:
        - name: config-volume
          configMap:
            name: pay-server-config
            items:
              - key: application.properties
                path: application.properties  # /app/config/application.properties 로 마운트
